server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/proctoring_db}
    username: ${SPRING_DATASOURCE_USERNAME:proctoring_user}
    password: ${SPRING_DATASOURCE_PASSWORD:proctoring_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        show_sql: false
        format_sql: false
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: 2s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: proctoring-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.aiu.proctoring.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      retry-backoff: 1000
      enable-idempotence: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_minimum_256_bits_long_string_change_in_prod_2026}
    expiration: ${APP_JWT_EXPIRATION:86400000} # 24h
    refresh-expiration: ${APP_JWT_REFRESH_EXPIRATION:604800000} # 7d
  gdpr:
    anonymize-after-days: 30
    retention-days: 90
  security:
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  oauth2:
    registration:
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
        scope: email,profile

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.aiu.proctoring: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/proctoring.log
    max-size: 10MB
    max-history: 7

ai:
  provider: ${AI_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    endpoint: ${OPENAI_ENDPOINT:https://api.openai.com/v1/chat/completions}
    model: ${AI_OPENAI_MODEL:gpt-4o-mini}
  timeout: ${AI_TIMEOUT:30s}
  max-retries: 3

rate:
  limit:
    ai:
      requests: ${RATE_LIMIT_AI_REQUESTS:60}
      window: ${RATE_LIMIT_AI_WINDOW:60}
