apiVersion: v1
kind: Namespace
metadata:
  name: proctoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proctoring-config
  namespace: proctoring
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-svc.proctoring.svc.cluster.local:5432/proctoring_db"
  SPRING_DATASOURCE_USERNAME: "proctoring_user"
  SPRING_REDIS_HOST: "redis-svc.proctoring.svc.cluster.local"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-svc.proctoring.svc.cluster.local:9092"
  AI_PROVIDER: "openai"
  AI_OPENAI_MODEL: "gpt-4o-mini"
  RATE_LIMIT_AI_REQUESTS: "60"
  RATE_LIMIT_AI_WINDOW: "60"

---
apiVersion: v1
kind: Secret
metadata:
  name: proctoring-secrets
  namespace: proctoring
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: "proctoring_pass_secure"
  JWT_SECRET: "base64_256_bit_secret_here_minimum"
  OPENAI_API_KEY: "sk-proj-..."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proctoring-backend
  namespace: proctoring
  labels:
    app: proctoring-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proctoring-backend
  template:
    metadata:
      labels:
        app: proctoring-backend
    spec:
      containers:
      - name: backend
        image: registry.example.com/proctoring/backend:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: proctoring-config
        - secretRef:
            name: proctoring-secrets
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: proctoring-backend-svc
  namespace: proctoring
spec:
  selector:
    app: proctoring-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proctoring-ingress
  namespace: proctoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - proctoring.aiu.kz
    secretName: proctoring-tls
  rules:
  - host: proctoring.aiu.kz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: proctoring-backend-svc
            port:
              number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proctoring-backend-hpa
  namespace: proctoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proctoring-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
